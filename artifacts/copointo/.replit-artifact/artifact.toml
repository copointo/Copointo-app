kind = "mobile"
previewPath = "/"
title = "Copointo"
version = "1.0.0"
id = "artifacts/copointo"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23297

[services.development]
run = "pnpm --filter @workspace/copointo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/copointo", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/copointo", "run", "serve" ]

[services.env]
PORT = "23297"
BASE_PATH = "/"
